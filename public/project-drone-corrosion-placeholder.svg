<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="Drone illustration">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e24"/>
      <stop offset="100%" style="stop-color:#2a2a32"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Centered drone (top-down quadcopter) -->
  <g transform="translate(400 200)" fill="none" stroke="#ff8c42" stroke-linecap="round" stroke-linejoin="round">
    <!-- Propellers: ring + cross blades + hub -->
    <g stroke-width="2.8" stroke-opacity="1">
      <g opacity="0.98">
        <circle cx="0" cy="-95" r="23"/>
        <circle cx="0" cy="95" r="23"/>
        <circle cx="-95" cy="0" r="23"/>
        <circle cx="95" cy="0" r="23"/>
      </g>
      <!-- Blade pairs (perpendicular crosses, read clearly as rotors) -->
      <g stroke-width="2.2" stroke-opacity="0.72">
        <ellipse cx="0" cy="-95" rx="34" ry="8"/>
        <ellipse cx="0" cy="-95" rx="8" ry="34"/>
        <ellipse cx="0" cy="95" rx="34" ry="8"/>
        <ellipse cx="0" cy="95" rx="8" ry="34"/>
        <ellipse cx="-95" cy="0" rx="34" ry="8"/>
        <ellipse cx="-95" cy="0" rx="8" ry="34"/>
        <ellipse cx="95" cy="0" rx="34" ry="8"/>
        <ellipse cx="95" cy="0" rx="8" ry="34"/>
      </g>
      <!-- Motor hubs -->
      <g fill="#ff8c42" fill-opacity="0.22" stroke-width="1.8" stroke-opacity="0.95">
        <circle cx="0" cy="-95" r="6"/>
        <circle cx="0" cy="95" r="6"/>
        <circle cx="-95" cy="0" r="6"/>
        <circle cx="95" cy="0" r="6"/>
      </g>
    </g>
    <!-- Arms -->
    <g stroke-width="2.5" stroke-opacity="0.55">
      <line x1="0" y1="-28" x2="0" y2="-72"/>
      <line x1="0" y1="28" x2="0" y2="72"/>
      <line x1="-28" y1="0" x2="-72" y2="0"/>
      <line x1="28" y1="0" x2="72" y2="0"/>
    </g>
    <!-- Body -->
    <rect x="-26" y="-18" width="52" height="36" rx="8" ry="8" fill="#25252d" stroke-width="2.2" stroke-opacity="0.9"/>
    <!-- Forward marker -->
    <path d="M 0 -18 L -6 -30 L 6 -30 Z" fill="#ff8c42" fill-opacity="0.35" stroke="none"/>
  </g>
</svg>
